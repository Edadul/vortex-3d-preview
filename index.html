<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VÖRTEX | Prototipos 3D</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 40px 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #050505; 
            color: white;
            display: flex;
            flex-direction: column; 
            min-height: 100vh;
            align-items: center;
        }

        .main-title {
            font-weight: 700;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
            background: linear-gradient(to right, #bf953f, #d8b56f, #ffe0a3, #c3913d, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.8rem;
        }

        .main-subtitle {
            font-weight: 300;
            opacity: 0.6;
            letter-spacing: 4px;
            margin-bottom: 50px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .models-container {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            width: 95%;
            max-width: 1200px;
            justify-content: center;
        }

        .container {
            flex: 1;
            min-width: 350px;
            text-align: center;
            background: #0f0f0f;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #1a1a1a;
            transition: all 0.3s ease;
        }

        .container:hover {
            transform: translateY(-10px);
            border-color: #d4af37;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.1);
        }

        .viewer-shell {
            position: relative;
        }

        h2 {
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 1.1rem;
            margin-top: 20px;
            color: #fff;
        }

        .copy {
            font-weight: 300;
            font-style: italic;
            opacity: 0.5;
            font-size: 0.85rem;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .test-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            padding: 12px 22px;
            border-radius: 999px;
            border: 1px solid #d4af37;
            background: linear-gradient(45deg, #bf953f, #fcf6ba);
            color: #050505;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .test-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.45);
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(5, 5, 5, 0.92), rgba(16, 16, 16, 0.98));
            border: 1px solid rgba(212, 175, 55, 0.16);
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.72rem;
            font-weight: 700;
            z-index: 2;
            transition: opacity 0.25s ease, visibility 0.25s ease;
        }

        .loading-overlay.is-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-spinner {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-top-color: #d4af37;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        model-viewer {
            width: 100%;
            height: 500px;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            border-radius: 16px;
            --poster-color: transparent;
        }

        #ar-button {
            background: linear-gradient(45deg, #bf953f, #fcf6ba);
            border-radius: 30px;
            border: none;
            position: absolute;
            bottom: 16px;
            right: 16px;
            padding: 10px 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: black;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <h1 class="main-title">VÖRTEX</h1>
    <p class="main-subtitle">El Ritual Post-Entrenamiento</p>

    <div class="models-container">
        <div class="container">
            <h2>El Envase</h2>
            <p class="copy">Excelencia ergonómica. Ingeniería de precisión diseñada para el atleta de élite.</p>
            <div class="viewer-shell">
                <div class="loading-overlay" data-loading-overlay>
                    <div class="loading-spinner"></div>
                    <span>Cargando modelo</span>
                </div>

                <model-viewer 
                    src="bottle.glb" 
                    ar ar-modes="webxr scene-viewer quick-look" 
                    camera-controls 
                    tone-mapping="neutral" 
                    shadow-intensity="2"
                    auto-rotate
                    alt="Termo Vortex">
                    <button slot="ar-button" id="ar-button">VER EN AR</button>
                </model-viewer>
            </div>
        </div>
    
        <div class="container">
            <h2>La Estación</h2>
            <p class="copy">El punto de encuentro entre inteligencia automatizada y nutrición superior.</p>
            <a class="test-button" href="https://claude.ai/public/artifacts/c873b217-0e67-47f5-a125-e418ce1fa44b" target="_blank" rel="noopener noreferrer">Probar funcionalidad</a>
            <div class="viewer-shell">
                <div class="loading-overlay" data-loading-overlay>
                    <div class="loading-spinner"></div>
                    <span>Cargando modelo</span>
                </div>

                <model-viewer 
                    src="vending.glb" 
                    ar ar-modes="webxr scene-viewer quick-look" 
                    camera-controls 
                    tone-mapping="neutral" 
                    shadow-intensity="2"
                    auto-rotate
                    alt="Máquina Vending Vortex">
                    <button slot="ar-button" id="ar-button">VER EN AR</button>
                </model-viewer>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.viewer-shell').forEach((shell) => {
            const viewer = shell.querySelector('model-viewer');
            const overlay = shell.querySelector('[data-loading-overlay]');

            if (!viewer || !overlay) {
                return;
            }

            const hideOverlay = () => overlay.classList.add('is-hidden');

            viewer.addEventListener('load', hideOverlay, { once: true });
            viewer.addEventListener('error', hideOverlay, { once: true });
        });
    </script>

</body>
</html>
